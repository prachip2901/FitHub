<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Trainer Profile | FitLife</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #4DA8DA;
  --accent: #ff6b35;
  --text-color: #333;
}

/* Body (same as login) */
body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #f7f9fc, #eaf1f8);
}

/* Card (same as login) */
.card {
  width: 100%;
  max-width: 450px;
  padding: 2.5rem;
  border-radius: 20px;
  background: #fff;
  box-shadow: 0 15px 40px rgba(0,0,0,0.08);
  animation: fadeIn 0.7s ease;
}

/* Title */
.title {
  text-align: center;
  font-weight: 600;
  margin-bottom: 20px;
  font-size: 1.7rem;
}

/* Inputs (same style) */
.form-control, textarea, select {
  background: #f9f9f9;
  border: 1px solid #d1d5db;
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 15px;
}

.form-control:focus, textarea:focus, select:focus {
  border-color: var(--primary);
  box-shadow: 0 0 10px rgba(77,168,218,0.2);
  outline: none;
}

/* Button (same as login) */
.btn-main {
  width: 100%;
  background: linear-gradient(135deg,#ff935c,#ff6b35);
  border: none;
  border-radius: 30px;
  padding: 12px;
  font-weight: 600;
  color: #fff;
  transition: 0.3s;
}

.btn-main:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(255,107,53,0.3);
}

/* Animation */
@keyframes fadeIn {
  from {opacity:0; transform:translateY(25px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="card">
  <h3 class="title">Create Trainer Profile 🧑‍🏫</h3>

  <form method="POST" enctype="multipart/form-data" id="form">
    {% csrf_token %}

    {{ form.name }}
    {{ form.specialization }}
    {{ form.experience }}
    {{ form.price }}
    {{ form.bio }}
    {{ form.profile_image }}

    <button type="submit" class="btn-main" id="btn">
      Save Profile
    </button>
  </form>
</div>

<script>
document.getElementById("form").addEventListener("submit", function(){
  const btn = document.getElementById("btn");
  btn.innerHTML = "Saving...";
  btn.disabled = true;
});
</script>

</body>
</html>
