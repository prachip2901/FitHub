<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-color: #4DA8DA;
      --accent-color: #ff6b35;
      --accent-color-dark: #e85a2a;
      --accent-color-hover: #ff7f50;
      --bg-dark: #0d1b2a;
      --bg-light: #f8f9fa;
      --bg-neutral: #f5f7fa;
      --text-light: #f0f6ff;
      --text-dark: #212529;
      --card-bg: #ffffff;
      --soft-shadow: 0 6px 18px rgba(13,27,42,0.08);

            --dark-navy: #0d1b2a;
      --steel-blue: #1b3a57;
      --light-blue: #4DA8DA;
      --accent-orange: #ff6b35;
      --accent-orange-dark: #e85a2a;
      --accent-orange-hover: #ff7f50;
      --bg-neutral: #f5f7fa;
      --card-radius: 16px;
      --soft-shadow: 0 6px 18px rgba(13,27,42,0.08);
      --primary-color: #4DA8DA;
  --accent-color: #ff6b35;
  --bg-dark: #0d1b2a;
  --bg-light: #f8f9fa;
  --text-light: #f0f6ff;
  --text-dark: #212529;
  --card-bg: #ffffff;

      --dark-navy: #0d1b2a;
      --steel-blue: #1b3a57;
      --light-blue: #4DA8DA;
      --accent-orange: #ff6b35;
      --accent-orange-dark: #e85a2a;
      --accent-orange-hover: #ff7f50;
      --bg-neutral: #f5f7fa;
      --soft-shadow: 0 6px 18px rgba(13,27,42,0.08);

      
    }


    
    /* CTA Buttons */
    .btn-primary {
      background: var(--accent-orange);
      border: none;
      color: #fff;
      font-weight: 700;
      border-radius: 30px;
      padding: .6rem 1.2rem;
      transition: background .3s, transform .2s;
    }
    .btn-primary:hover {
      background: var(--accent-orange-dark);
      transform: translateY(-2px);
    }
    .btn-outline-primary {
      color: var(--dark-navy);
      border: 2px solid var(--dark-navy);
      border-radius: 30px;
      font-weight: 600;
      transition: background .3s, color .3s;
    }
    .btn-outline-primary:hover {
      background: var(--dark-navy);
      color: #fff;
    }

    /* FadeInUp Animation */
    @keyframes fadeInUp {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    /* -------------------- Base -------------------- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
  font-family:'Inter', sans-serif;
      background: var(--bg-neutral);
      color: var(--text-dark);
      scroll-behavior: smooth;
      padding-top: 70px;
    }

    
    a { text-decoration: none; }

    /* -------------------- Navbar -------------------- */
    .navbar-modern {
      background: rgba(13,27,42,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: .8rem 0;
      transition: all .3s ease;
    }
    .navbar-modern .navbar-brand .logo-text {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--primary-color), #00c6ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .navbar-modern .nav-link {
      position: relative;
      color: var(--text-light) !important;
      font-weight: 500;
      margin: 0 .6rem;
      transition: color .3s ease;
    }
    .navbar-modern .nav-link::after {
      content: "";
      position: absolute;
      bottom: -4px; left: 0;
      width: 0%; height: 2px;
      background: var(--primary-color);
      transition: width .3s ease;
    }
    .navbar-modern .nav-link:hover::after { width: 100%; }
    .navbar-modern .nav-link:hover { color: var(--primary-color) !important; }

    .toggler-icon { font-size: 1.4rem; color: #fff; }

    .btn-logout {
      background: linear-gradient(90deg,var(--accent-color),var(--accent-color-dark));
      color: #fff !important;
      border-radius: 25px;
      padding: .45rem 1.1rem;
      font-weight: 600;
      transition: transform .2s, background .3s;
    }
    .btn-logout:hover {
      transform: scale(1.05);
      background: linear-gradient(90deg,var(--accent-color-hover),#ff9966);
    }

    /* -------------------- Hero -------------------- */
    .hero {
      height: 350px;
      background: url('https://www.grampiansweightspecialists.com.au/wp-content/uploads/2025/04/The-Best-Weight-Loss-Programs-Of-2025-How-To-Choose-The-Right-One-For-You.png') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      color: white;
      width: 100%;
    }
    .hero::before {
      content:'';
      position:absolute;
      inset:0;
      background: linear-gradient(180deg, rgba(13,27,42,0.7), rgba(27,58,87,0.35));
    }
    .hero h2, .hero h1 {
      z-index:1;
      text-align: center;
      text-shadow: 2px 2px 10px black;
    }
    .hero h2 { font-size:2.5rem; }
    .hero h1 {
      font-size: 3rem;
      background: var(--bg-dark);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: fadeInUp 1.5s ease;
    }
    @keyframes fadeInUp { from {opacity:0; transform: translateY(30px);} to {opacity:1; transform:translateY(0);} }

    /* -------------------- Buttons -------------------- */
    .btn-primary {
      background: var(--accent-color);
      border: none;
      color: #fff;
      font-weight: 700;
      border-radius: 30px;
      padding: .6rem 1.2rem;
      transition: background .3s, transform .2s;
    }
    .btn-primary:hover { background: var(--accent-color-dark); transform: translateY(-2px); }
    .btn-outline-primary {
      color: var(--dark-navy);
      border: 2px solid var(--dark-navy);
      border-radius: 30px;
      font-weight: 600;
      transition: background .3s, color .3s;
    }
    .btn-outline-primary:hover { background: var(--dark-navy); color: #fff; }

    /* -------------------- Cards -------------------- */
    #community .post-card, 
    #contact .card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 12px;
      box-shadow: var(--soft-shadow);
      transition: transform 0.2s, box-shadow 0.2s;
      margin-bottom: 12px;
    }
    #community .post-card:hover,
    #contact .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.12);
    }


  

    

    /* -------------------- Images & Video -------------------- */
    #feed img { max-height:250px; object-fit:cover; border-radius:8px; cursor:pointer; transition: transform 0.2s; }
    #feed img:hover { transform: scale(1.02); }
    .video-wrapper video:hover { transform: scale(1.03); transition: transform .3s ease; }

    /* -------------------- Modal -------------------- */
    #imageModal { display:none; position:fixed; z-index:1050; padding-top:60px; inset:0; background-color: rgba(0,0,0,0.9); }
    #imageModal img { margin:auto; display:block; max-width:90%; max-height:90vh; border-radius:8px; }
    #imageModal span { position:absolute; top:20px; right:40px; color:white; font-size:30px; font-weight:bold; cursor:pointer; }

    /* -------------------- Alerts -------------------- */
    .alert-success { opacity:0; transform: translateY(-20px); transition: opacity 0.5s ease, transform 0.5s ease; }
    .alert-success.show { opacity:1; transform:translateY(0); }

    input, textarea { border-radius:6px; }

    /* -------------------- Media Queries -------------------- */
    @media(max-width:768px){
      .video-wrapper video { border-radius:10px; }
      #feed .col-12 { padding-left:0; padding-right:0; }
    }

  </style>

  <title>{% block title %}FitLife | Fitness Website{% endblock %}</title>
</head>
<body>

  <!-- -------------------- Navbar -------------------- -->
  <nav class="navbar navbar-expand-lg navbar-modern fixed-top shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{% url 'home' %}">
        <span class="logo-text">FitLife</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="toggler-icon">☰</span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Home</a></li>
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Workouts</a>
            <ul class="dropdown-menu shadow-lg rounded-3">
              <li><a class="dropdown-item" href="{% url 'yoga' %}">Yoga</a></li>
              <li><a class="dropdown-item" href="{% url 'weightloss' %}">Weight Loss</a></li>
              <li><a class="dropdown-item" href="{% url 'dietplans' %}">Diet Plans</a></li>
              <li><a class="dropdown-item" href="{% url 'strenghtraining' %}">Strength Training</a></li>
              <li><a class="dropdown-item" href="{% url 'cardio' %}">Cardio</a></li>
              <li><a class="dropdown-item" href="{% url 'hiit' %}">HIIT</a></li>
            </ul>
          </li>
          <li class="nav-item"><a class="nav-link" href="{% url 'trainers_hub' %}">Trainers</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'membership' %}">Membership</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'progress_page' %}">Progress</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'community' %}">Community</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'contact' %}">Contact</a></li>
          <li class="nav-item ms-2">
            <a class="btn btn-logout" href="{% url 'logout' %}">Logout</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- -------------------- Page Content -------------------- -->
  <div class="container-fluid">
    {% block body %}
    <!-- Page-specific content will go here -->
    {% endblock %}
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
