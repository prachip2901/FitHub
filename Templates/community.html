{% extends "base.html" %}

{% block title %}Community{% endblock title %}

{% block head %}

<style>
#community .post-card {
    background: #fff;
    border-radius: 12px;
    padding: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    transition: transform 0.2s, box-shadow 0.2s;
    margin-bottom: 12px;
}
#community .post-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 18px rgba(0,0,0,0.12);
}

#notificationArea {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 1000;
}

#feed img {
    max-height: 250px;
    object-fit: cover;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.2s;
}
#feed img:hover {
    transform: scale(1.02);
}

.btn-like, .btn-comment, .btn-bookmark, .btn-share, .btn-delete {
    font-size: 0.8rem;
    padding: 3px 6px;
    transition: transform 0.2s, background 0.2s;
}
.btn-like:hover, .btn-comment:hover, .btn-bookmark:hover, .btn-share:hover, .btn-delete:hover {
    transform: scale(1.08);
}

input, textarea { border-radius: 6px; }

@media(max-width:768px){ 
    #feed .col-12 { padding-left:0; padding-right:0; } 
}

/* --- Fullscreen Image Modal --- */
#imageModal {
    display: none;
    position: fixed;
    z-index: 1050;
    padding-top: 60px;
    left: 0; top: 0;
    width: 100%;
    height: 100%;
    overflow: auto;
    background-color: rgba(0,0,0,0.9);
}
#imageModal img {
    margin: auto;
    display: block;
    max-width: 90%;
    max-height: 90vh;
    border-radius: 8px;
}
#imageModal span {
    position: absolute;
    top: 20px;
    right: 40px;
    color: white;
    font-size: 30px;
    font-weight: bold;
    cursor: pointer;
}
</style>
{% endblock head %}

{% block body %}

<section id="community" class="py-4">
<div class="container">
  <div class="text-center mb-4">
    <h1 class="fw-bold">🏋️‍♂️ Community Feed</h1>
    <p class="text-muted">Connect with others and share your fitness journey!</p>
  </div>

  <!-- Online Users -->
  <div class="text-center mb-2">
      Online Users: <span id="onlineUsers">1</span>
  </div>

  <!-- Notification Area -->
  <div id="notificationArea"></div>

  <!-- Create Post -->
  <div class="card mb-3 shadow-sm p-3 post-card">
      <h5>Create a Post</h5>
      <input type="text" id="username" class="form-control mb-2" placeholder="Your Name">
      <textarea id="postText" class="form-control mb-2" rows="2" placeholder="What's on your mind?"></textarea>
      <input type="file" id="postImage" class="form-control mb-2" accept="image/*">
      <div id="imagePreview" class="mb-2"></div>
      <button class="btn btn-primary w-100 btn-sm" onclick="createPost()">Post</button>
  </div>

  <!-- Feed -->
  <div id="feed" class="row g-2"></div>
</div>

<!-- Image Modal -->
<div id="imageModal">
    <span id="closeModal">&times;</span>
    <img id="modalImage" src="" alt="Full View">
</div>

<script>
// ----- Global Variables -----
let feedContainer = document.getElementById("feed");
let posts = JSON.parse(localStorage.getItem("posts")) || [];
let currentUser = "";

// Generate unique ID for each post
function generateId() { return '_' + Math.random().toString(36).substr(2, 9); }

// ----- Online Users -----
function updateOnlineUsers(){
    const onlineCount = Math.floor(Math.random()*10)+1;
    document.getElementById("onlineUsers").textContent = onlineCount;
}
setInterval(updateOnlineUsers, 5000);

// ----- Notifications -----
function showNotification(message){
    const notif = document.createElement("div");
    notif.className = "alert alert-info position-fixed top-0 end-0 m-3";
    notif.style.zIndex = 10000;
    notif.innerText = message;
    document.body.appendChild(notif);
    setTimeout(()=> notif.remove(), 3000);
}

// ----- Image Preview -----
document.getElementById('postImage').addEventListener('change', function(){
    const preview = document.getElementById('imagePreview');
    preview.innerHTML = '';
    if(this.files && this.files[0]){
        const img = document.createElement('img');
        img.src = URL.createObjectURL(this.files[0]);
        img.style.maxHeight = '150px';
        img.className = 'rounded';
        preview.appendChild(img);
    }
});

// ----- Render Posts -----
function renderPosts() {
    feedContainer.innerHTML = "";
    if(posts.length === 0){
        feedContainer.innerHTML = `<div class="text-center p-4 col-12">
            <img src="https://source.unsplash.com/200x150/?community,fitness" alt="No posts" class="mb-3 rounded" style="max-width:100%;">
            <h5 class="fw-bold">No posts yet</h5>
            <p class="text-muted">Be the first to share your fitness journey!</p>
        </div>`;
        return;
    }

    const sortedPosts = [...posts].sort((a,b)=>b.timestamp - a.timestamp);

    sortedPosts.forEach(post=>{
        const colDiv = document.createElement("div");
        colDiv.className="col-12";
        colDiv.id = `post-${post.id}`;
        colDiv.innerHTML = `
            <div class="card p-2 shadow-sm post-card">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <div><strong>${post.username}</strong></div>
                    <div class="d-flex gap-1 flex-wrap">
                        <button class="btn btn-sm btn-outline-primary btn-like" id="like-${post.id}">👍 ${post.likes}</button>
                        <button class="btn btn-sm btn-outline-secondary btn-comment" onclick="toggleComments('${post.id}')">💬 ${post.comments.length}</button>
                        <button class="btn btn-sm btn-outline-success btn-bookmark" id="bookmark-${post.id}">🔖 ${post.bookmarked?'Saved':'Save'}</button>
                        <button class="btn btn-sm btn-outline-info btn-share" onclick="sharePost('${encodeURIComponent(post.text)}')">📤</button>
                        <button class="btn btn-sm btn-outline-danger btn-delete" id="delete-${post.id}">🗑️</button>
                    </div>
                </div>
                ${post.image? `<img src="${post.image}" class="mb-2 rounded w-100 post-img" onclick="openImageModal('${post.image}')">` : ""}
                <p style="margin-bottom:5px;">${post.text}</p>
                <div id="comments-${post.id}" class="mt-2" style="display:none;">
                    <input type="text" id="commentInput-${post.id}" class="form-control form-control-sm mb-1" placeholder="Add comment..." onkeypress="if(event.key==='Enter'){addComment('${post.id}');}">
                    <ul class="list-group" id="commentList-${post.id}">
                        ${post.comments.map(c=>`<li class="list-group-item p-1">${c}</li>`).join('')}
                    </ul>
                </div>
            </div>`;
        feedContainer.appendChild(colDiv);

        // Bind live events
        document.getElementById(`like-${post.id}`).addEventListener('click',()=>{ likePost(post.id); });
        document.getElementById(`bookmark-${post.id}`).addEventListener('click',()=>{ bookmarkPost(post.id); });
        document.getElementById(`delete-${post.id}`).addEventListener('click',()=>{ deletePost(post.id); });
    });
}

// ----- Post Actions -----
function createPost(){
    const username = document.getElementById("username").value.trim() || "Anonymous";
    currentUser = username;
    const text = document.getElementById("postText").value.trim();
    const imageInput = document.getElementById("postImage");

    if(!text && !imageInput.files[0]) { alert("Post cannot be empty!"); return; }

    const newPost = {
        id: generateId(),
        username,
        text,
        image: null,
        likes: 0,
        comments: [],
        bookmarked: false,
        timestamp: Date.now()
    };

    if(imageInput.files[0]){
        const reader = new FileReader();
        reader.onload = function(e){
            newPost.image = e.target.result;
            posts.push(newPost);
            localStorage.setItem("posts", JSON.stringify(posts));
            renderPosts();
            scrollToPost(newPost.id);
            clearForm();
            showNotification(`${username} just posted! 🎉`);
        };
        reader.readAsDataURL(imageInput.files[0]);
    } else {
        posts.push(newPost);
        localStorage.setItem("posts", JSON.stringify(posts));
        renderPosts();
        scrollToPost(newPost.id);
        clearForm();
        showNotification(`${username} just posted! 🎉`);
    }
}

function scrollToPost(postId){
    const elem = document.getElementById(`post-${postId}`);
    if(elem) elem.scrollIntoView({behavior:'smooth', block:'start'});
}

function likePost(postId){
    const post = posts.find(p=>p.id===postId);
    post.likes++;
    document.getElementById(`like-${post.id}`).innerText = `👍 ${post.likes}`;
    localStorage.setItem("posts", JSON.stringify(posts));
}

function addComment(postId){
    const input = document.getElementById(`commentInput-${postId}`);
    const val = input.value.trim();
    if(val){
        const post = posts.find(p=>p.id===postId);
        post.comments.push(`${currentUser}: ${val}`);
        input.value = '';
        const ul = document.getElementById(`commentList-${post.id}`);
        const li = document.createElement('li');
        li.className = "list-group-item p-1";
        li.innerText = `${currentUser}: ${val}`;
        ul.appendChild(li);
        document.querySelector(`.btn-comment`).innerText = `💬 ${post.comments.length}`;
        localStorage.setItem("posts", JSON.stringify(posts));
    }
}

function toggleComments(postId){
    const div = document.getElementById(`comments-${postId}`);
    div.style.display = div.style.display==='none'?'block':'none';
}

function bookmarkPost(postId){
    const post = posts.find(p=>p.id===postId);
    post.bookmarked = !post.bookmarked;
    document.getElementById(`bookmark-${post.id}`).innerText = post.bookmarked ? '🔖 Saved' : '🔖 Save';
    localStorage.setItem("posts", JSON.stringify(posts));
}

function deletePost(postId){
    if(confirm("Are you sure you want to delete this post? 🗑️")){
        posts = posts.filter(p=>p.id!==postId);
        document.getElementById(`post-${postId}`).remove();
        localStorage.setItem("posts", JSON.stringify(posts));
        showNotification("A post was deleted 🗑️");
    }
}

function sharePost(content){
    const text = decodeURIComponent(content);
    if(navigator.share){
        navigator.share({ title:"Fitness Post", text, url:window.location.href });
    } else {
        prompt("Copy this text to share:", text);
    }
}

// ----- Full Image Modal -----
function openImageModal(src) {
    const modal = document.getElementById("imageModal");
    const modalImg = document.getElementById("modalImage");
    modal.style.display = "block";
    modalImg.src = src;
}
document.getElementById("closeModal").onclick = function() {
    document.getElementById("imageModal").style.display = "none";
};
document.getElementById("imageModal").addEventListener("click", function(e) {
    if (e.target === this) this.style.display = "none";
});

// ----- Initialize -----
renderPosts();
updateOnlineUsers();
</script>
{% endblock body %}
