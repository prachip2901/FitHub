{% extends 'base.html' %}
{% block title %}AI Diet Chat{% endblock title %}
{% block body %}
<section class="container py-4">
<h2>🤖 AI Diet Coach</h2>
<form method="POST">
{% csrf_token %}
<input type="text" name="message" class="form-control w-50 d-inline" placeholder="Ask AI...">
<button class="btn btn-primary ms-2">Send</button>
</form>

<div class="mt-4">
{% for chat in chats %}
<p><b>You:</b> {{ chat.message }}</p>
<p><b>AI:</b> {{ chat.response }}</p>
<hr>
{% endfor %}
</div>
</section>
{% endblock %}
