<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create Trainer Profile | FitLife</title>
  
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f8f9fa;
    }
    .container {
      max-width: 600px;
      margin-top: 50px;
      padding: 30px;
      background-color: #fff;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }
    .header {
      text-align: center;
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 25px;
      color: #4DA8DA;
    }
    .form-label {
      font-weight: 500;
    }
    .btn-submit {
      background-color: #4DA8DA;
      color: white;
      font-weight: 500;
      width: 100%;
    }
    .btn-submit:hover {
      background-color: #3390c4;
      color: white;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">Create Trainer Profile</div>

    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}

      <div class="mb-3">
        <label for="id_name" class="form-label">Full Name</label>
        {{ form.name }}
      </div>

      <div class="mb-3">
        <label for="id_specialization" class="form-label">Specialization</label>
        {{ form.specialization }}
      </div>

      <div class="mb-3">
        <label for="id_experience" class="form-label">Experience (Years)</label>
        {{ form.experience }}
      </div>

      <div class="mb-3">
        <label for="id_price" class="form-label">Session Price ($)</label>
        {{ form.price }}
      </div>

      <div class="mb-3">
        <label for="id_bio" class="form-label">Bio</label>
        {{ form.bio }}
      </div>

      <div class="mb-3">
        <label for="id_profile_image" class="form-label">Profile Image</label>
        {{ form.profile_image }}
      </div>

      <button type="submit" class="btn btn-submit">Save Profile</button>
    </form>
  </div>

</body>
</html>
