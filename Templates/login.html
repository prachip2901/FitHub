{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | FitLife</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #4DA8DA;
  --accent: #ff6b35;
  --text-color: #333;
  --card-bg: #ffffff;
}

/* Body */
body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #f7f9fc, #eaf1f8);
  color: var(--text-color);
  margin: 0;
}

/* Card */
.card {
  width: 100%;
  max-width: 420px;
  padding: 2.5rem;
  border-radius: 20px;
  background: var(--card-bg);
  border: none;
  box-shadow: 0 15px 40px rgba(0,0,0,0.08);
  animation: fadeIn 0.8s ease;
  position: relative;
}

/* Title */
.title { text-align: center; font-weight: 600; margin-bottom: 25px; font-size: 1.7rem; }

/* Inputs */
.form-control {
  background: #f9f9f9;
  border: 1px solid #d1d5db;
  color: var(--text-color);
  border-radius: 12px;
  padding: 12px 14px;
  transition: 0.3s;
}
.form-control::placeholder { color: #999; }
.form-control:focus {
  border-color: var(--primary);
  box-shadow: 0 0 10px rgba(77,168,218,0.2);
}

/* Eye toggle */
.eye {
  position: absolute;
  right: 15px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: #666;
}

/* Button */
.btn-login {
  width: 100%;
  background: linear-gradient(135deg,#ff935c,#ff6b35);
  border: none;
  border-radius: 30px;
  padding: 12px;
  font-weight: 600;
  color: #fff;
  transition: 0.3s;
  margin-top: 10px;
}
.btn-login:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(255,107,53,0.3);
}

/* Links */
.links { text-align: center; margin-top: 15px; }
.links a { color: var(--primary); text-decoration: none; font-size: 14px; font-weight: 500; }
.links a:hover { text-decoration: underline; }

/* FadeIn */
@keyframes fadeIn { from {opacity:0; transform:translateY(30px);} to {opacity:1; transform:translateY(0);} }

/* Role Toggle - Animated Sliding Pill */
.role-toggle {
  position: relative;
  display: flex;
  justify-content: space-between;
  margin-bottom: 25px;
  border-radius: 50px;
  background: #f0f0f0;
  border: 1px solid #d1d5db;
  overflow: hidden;
  height: 45px;
}

.role-toggle button {
  flex: 1;
  border: none;
  background: transparent;
  font-weight: 500;
  color: #555;
  cursor: pointer;
  position: relative;
  z-index: 2;
  transition: color 0.3s, font-size 0.3s;
  font-size: 16px;
}

.role-toggle .slider {
  position: absolute;
  top: 0; left: 0;
  width: 50%;
  height: 100%;
  background: var(--primary);
  border-radius: 50px;
  transition: transform 0.3s ease;
  z-index: 1;
}

/* Active text color */
.role-toggle button.active { color: #fff; }

/* Responsive adjustments */
@media (max-width: 480px) {
  .card { padding: 2rem; max-width: 90%; }
  .role-toggle { height: 40px; }
  .role-toggle button { font-size: 14px; }
  .btn-login { padding: 10px; font-size: 15px; }
}
</style>
</head>

<body>
<div class="card">
  <h3 class="title">Welcome Back 👋</h3>

  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }}">{{ message }}</div>
    {% endfor %}
  {% endif %}

  <form id="loginForm" method="POST">
    {% csrf_token %}
    
    <!-- Role Toggle with Slider -->
    <div class="role-toggle">
      <div class="slider" id="roleSlider"></div>
      <button type="button" class="active" id="roleUser">User</button>
      <button type="button" id="roleTrainer">Trainer</button>
    </div>
    <input type="hidden" id="roleInput" value="user">

    <div class="mb-3">
      <input type="email" name="email" class="form-control" placeholder="Enter Email" required>
    </div>
    <div class="mb-3 position-relative">
      <input type="password" id="password" name="password" class="form-control" placeholder="Enter Password" required>
      <span class="eye" onclick="togglePassword()">👁</span>
    </div>

    <button type="button" class="btn-login" onclick="login()">Login</button>
  </form>

  <div class="links">
    <a href="{% url 'forgot_password' %}">Forgot Password?</a>
  </div>

  <hr>

  <div class="links">
    <span>Don't have an account?</span><br>
    <a href="{% url 'signup' %}">Create Account</a>
  </div>
</div>

<script>
function togglePassword(){
  const pass = document.getElementById("password");
  pass.type = pass.type === "password" ? "text" : "password";
}

// Role Toggle Logic with sliding animation
const roleUserBtn = document.getElementById('roleUser');
const roleTrainerBtn = document.getElementById('roleTrainer');
const roleSlider = document.getElementById('roleSlider');
const roleInput = document.getElementById('roleInput');

roleUserBtn.addEventListener('click', ()=>{
  roleInput.value = 'user';
  roleUserBtn.classList.add('active');
  roleTrainerBtn.classList.remove('active');
  roleSlider.style.transform = 'translateX(0%)';
});
roleTrainerBtn.addEventListener('click', ()=>{
  roleInput.value = 'trainer';
  roleTrainerBtn.classList.add('active');
  roleUserBtn.classList.remove('active');
  roleSlider.style.transform = 'translateX(100%)';
});

function login(){
  const email = document.querySelector('input[name="email"]').value.trim();
  const password = document.getElementById("password").value;
  const role = roleInput.value;
  if(!email || !password){ alert("Fill all fields"); return; }

  fetch("{% url 'login' %}",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "X-CSRFToken": document.querySelector('[name=csrfmiddlewaretoken]').value
    },
    body:JSON.stringify({email,password,role})
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.status==="ok"){
      if(data.role==="trainer"){ window.location.href="{% url 'trainer_dashboard' %}"; }
      else{ window.location.href="{% url 'user_dashboard' %}"; }
    } else { alert(data.error); }
  })
  .catch(err=>alert("Error during login"));
}
</script>
</body>
</html>
