{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgot Password | FitLife</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #4DA8DA;
  --accent: #ff6b35;
}

body {
  min-height: 100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Inter',sans-serif;
  background: linear-gradient(135deg,#f7f9fc,#eaf1f8);
}

/* Card */
.card {
  width:100%;
  max-width:420px;
  padding:2.5rem;
  border-radius:20px;
  background:#fff;
  box-shadow:0 20px 50px rgba(0,0,0,0.08);
  animation:fadeIn 0.7s ease;
  position: relative;
  overflow: hidden;
}

/* Top Accent Line */
.card::before {
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:5px;
  background:linear-gradient(90deg,#ff6b35,#4DA8DA);
}

/* Title */
.title {
  text-align:center;
  font-weight:600;
  margin-bottom:8px;
}

.subtitle {
  text-align:center;
  font-size:14px;
  color:#666;
  margin-bottom:20px;
}

/* Input */
.form-control {
  background:#f9f9f9;
  border:1px solid #ddd;
  border-radius:12px;
  padding:12px;
  transition:0.3s;
}

.form-control:focus {
  border-color: var(--primary);
  box-shadow:0 0 10px rgba(77,168,218,0.2);
}

/* Button */
.btn-main {
  width:100%;
  border-radius:30px;
  padding:12px;
  font-weight:600;
  background:linear-gradient(135deg,#ff935c,#ff6b35);
  color:#fff;
  border:none;
  transition:0.3s;
}

.btn-main:hover {
  transform:translateY(-2px);
  box-shadow:0 10px 25px rgba(255,107,53,0.3);
}

/* Loader Spinner */
.spinner-border {
  width:18px;
  height:18px;
  margin-left:8px;
}

/* Links */
.links {
  text-align:center;
  margin-top:15px;
}

.links a {
  color: var(--primary);
  font-weight:500;
  text-decoration:none;
}

.links a:hover {
  text-decoration:underline;
}

/* Animation */
@keyframes fadeIn {
  from {opacity:0; transform:translateY(25px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="card">
  <h3 class="title">Forgot Password 🔐</h3>
  <p class="subtitle">Enter your email to receive a reset OTP</p>

  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }} text-center">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}

  <form method="POST" id="form">
    {% csrf_token %}
    
    <div class="mb-3">
      <input type="email" name="email" id="email"
             class="form-control"
             placeholder="Enter your email"
             required>
    </div>

    <button type="submit" class="btn-main" id="btn">
      Send OTP
    </button>
  </form>

  <div class="links">
    <a href="{% url 'login' %}">← Back to Login</a>
  </div>
</div>

<script>
const form = document.getElementById("form");
const btn = document.getElementById("btn");

form.addEventListener("submit", function(){
  btn.innerHTML = 'Sending <span class="spinner-border spinner-border-sm"></span>';
  btn.disabled = true;
});
</script>

</body>
</html>
