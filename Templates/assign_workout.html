<!DOCTYPE html>
<html>
<head>
<title>Assign Workout</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#f5f7fa">

<div class="container mt-5">
<div class="card p-4 shadow">
<h3>📅 Assign Workout</h3>

<form method="POST">
{% csrf_token %}

<label>Client</label>
{{ form.client }}

<label class="mt-3">Workout</label>
{{ form.workout }}

<label class="mt-3">Date</label>
{{ form.date }}

<label class="mt-3">Time</label>
{{ form.time }}

<button class="btn btn-success mt-3 w-100">Assign</button>

</form>
</div>
</div>

</body>
</html>
